version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/eshop_online
      - JWT_SECRET=eshop_online_jwt_secret_2026
      - JWT_REFRESH_SECRET=eshop_online_refresh_secret_2026
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USER=toxiccrazy91205@gmail.com
      - EMAIL_PASS=gvjnogamnddokkba
      - EMAIL_FROM=E-Shop Online

    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: unless-stopped

  seed:
    build: ./backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/eshop_online
    command: ["node", "scripts/seed.js"]
    depends_on:
      - mongo
    # This service runs once to seed the DB and exits.
    restart: "no"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
